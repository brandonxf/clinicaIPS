services:
  - type: web
    name: clinica-ips
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --max-requests 500 --max-requests-jitter 100
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: .onrender.com,localhost,127.0.0.1
      - key: DB_ENGINE
        value: django.db.backends.postgresql
      - key: DB_NAME
        fromDatabase:
          name: clinica-ips-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: clinica-ips-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: clinica-ips-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: clinica-ips-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: clinica-ips-db
          property: port

databases:
  - name: clinica-ips-db
    plan: free
    databaseName: clinica_ips
    user: clinica_ips_user
